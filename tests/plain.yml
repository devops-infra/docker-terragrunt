schemaVersion: 2.0.0

commandTests:
  - name: hcledit
    command: hcledit
    args: [version]
    expectedOutput: [0.2.17]

  - name: sops
    command: sops
    args: [--version]
    expectedOutput: [sops 3.10.2]

  - name: Other tools
    command: which
    args:
      - curl
      - bc
      - docker
      - git
      - go
      - gpg
      - dot
      - hub
      - hcledit
      - jq
      - make
      - task
      - tput
      - ssh
      - openssl
      - python3
      - pip3
      - unzip
      - wget
      - zip
    expectedOutput:
      - /usr/bin/curl
      - /usr/bin/bc
      - /usr/bin/docker
      - /usr/bin/git
      - /usr/bin/go
      - /usr/bin/gpg
      - /usr/bin/dot
      - /usr/bin/hub
      - /usr/bin/hcledit
      - /usr/bin/jq
      - /usr/bin/make
      - /usr/bin/task
      - /usr/bin/tput
      - /usr/bin/ssh
      - /usr/bin/openssl
      - /usr/bin/python3
      - /usr/bin/pip3
      - /usr/bin/unzip
      - /usr/bin/wget
      - /usr/bin/zip

  - name: Task version
    command: task
    args: [--version]
    expectedOutput: [Task version: v3.45.4]

  - name: Python modules
    command: pip
    args: [list]
    expectedOutput:
      - cloudflare
      - PyGithub
      - python-hcl2
      - requests
      - slack_sdk
      - anyio
      - zipp

  - name: APT lists cleaned
    command: bash
    args:
      - -lc
      - test -z "$(find /var/lib/apt/lists -mindepth 1 -maxdepth 1 2>/dev/null)"

  - name: APT cache cleaned
    command: bash
    args:
      - -lc
      - test -z "$(find /var/cache/apt -mindepth 1 -maxdepth 1 2>/dev/null)"
