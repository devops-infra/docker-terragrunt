schemaVersion: 2.0.0

commandTests:
  - name: OpenTofu
    command: bash
    args:
      - -lc
      - tofu --version | grep -Eq "^OpenTofu v${TG_VERSION}"

  - name: Terragrunt
    command: bash
    args:
      - -lc
      - terragrunt --version | grep -Eq "^terragrunt version v${TG_VERSION}"

  - name: Terraform not installed
    command: bash
    args:
      - -lc
      - '! command -v terraform >/dev/null 2>&1'
