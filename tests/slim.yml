schemaVersion: 2.0.0

commandTests:
  - name: Alpine version
    command: cat
    args: [/etc/os-release]
    expectedOutput: [VERSION_ID=3\.24]

  - name: Slim tools smoke tests
    command: bash
    args:
      - -lc
      - |
        curl --version >/dev/null
        git --version >/dev/null
        jq --version >/dev/null
        vim --version >/dev/null
        wget --version >/dev/null
        unzip -v >/dev/null
        format-hcl -help >/dev/null
        terragrunt --version >/dev/null

  - name: Cloud CLIs not installed
    command: bash
    args:
      - -lc
      - |
        for bin in aws az gcloud; do
          ! command -v "$bin" >/dev/null 2>&1 || exit 1
        done

  - name: Non-slim tools not installed
    command: bash
    args:
      - -lc
      - |
        for bin in bc docker go gpg dot hcledit gh make task tput ssh openssl python3 pip3 zip tflint sops; do
          ! command -v "$bin" >/dev/null 2>&1 || exit 1
        done

  - name: Temporary and APK cache cleaned
    command: bash
    args:
      - -lc
      - >-
        test ! -f /tmp/alpine-packages.txt &&
        test ! -f /tmp/alpine-packages-nonslim.txt &&
        test ! -f /tmp/alpine-packages-aws.txt &&
        (test ! -d /var/cache/apk || test -z "$(find /var/cache/apk -mindepth 1 -maxdepth 1 2>/dev/null)") &&
        (test ! -d /root/.cache || test -z "$(find /root/.cache -mindepth 1 -maxdepth 1 2>/dev/null)")

fileExistenceTests:
  - name: entrypoint.sh
    path: /usr/bin/entrypoint.sh
    shouldExist: true
    permissions: -rwxr-xr-x

  - name: format-hcl
    path: /usr/bin/format-hcl
    shouldExist: true
    permissions: -rwxr-xr-x

  - name: fmt.sh
    path: /usr/bin/fmt.sh
    shouldExist: true
    permissions: -rwxr-xr-x

  - name: terragrunt-fmt.sh
    path: /usr/bin/terragrunt-fmt.sh
    shouldExist: true
    permissions: -rwxr-xr-x

metadataTest:
  cmd: [entrypoint.sh]
  entrypoint: []
  exposedPorts: []
  workdir: /data
