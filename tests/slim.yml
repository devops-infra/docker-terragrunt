schemaVersion: 2.0.0

commandTests:
  - name: Ubuntu version
    command: cat
    args: [/etc/os-release]
    expectedOutput: [VERSION_ID=\"24.04\"]

  - name: Terragrunt
    command: bash
    envVars:
      - key: EXPECTED_TG_VERSION
        value: ${TG_VERSION}
    args:
      - -lc
      - terragrunt --version | grep -Eq "^terragrunt version v${EXPECTED_TG_VERSION}\n$"

  - name: Cloud CLIs not installed
    command: bash
    args:
      - -lc
      - |
        for bin in aws az gcloud; do
          ! command -v "$bin" >/dev/null 2>&1 || exit 1
        done

  - name: Plain-only tools not installed
    command: bash
    args:
      - -lc
      - |
        for bin in task docker go python3 pip3; do
          ! command -v "$bin" >/dev/null 2>&1 || exit 1
        done

  - name: Slim-only missing helper tools
    command: bash
    args:
      - -lc
      - |
        for bin in tflint hcledit sops; do
          ! command -v "$bin" >/dev/null 2>&1 || exit 1
        done

  - name: Additional non-slim tools not installed
    command: bash
    args:
      - -lc
      - |
        for bin in bc gpg dot hub make tput ssh openssl zip gh; do
          ! command -v "$bin" >/dev/null 2>&1 || exit 1
        done

  - name: Essential tools
    command: which
    args:
      - curl
      - git
      - jq
      - vim
      - wget
      - unzip
    expectedOutput:
      - /usr/bin/curl
      - /usr/bin/git
      - /usr/bin/jq
      - /usr/bin/vim
      - /usr/bin/wget
      - /usr/bin/unzip

  - name: APT lists cleaned
    command: bash
    args:
      - -lc
      - test -z "$(find /var/lib/apt/lists -mindepth 1 -maxdepth 1 2>/dev/null)"

  - name: APT cache cleaned
    command: bash
    args:
      - -lc
      - test -z "$(find /var/cache/apt -mindepth 1 -maxdepth 1 2>/dev/null)"

fileExistenceTests:
  - name: entrypoint.sh
    path: /usr/bin/entrypoint.sh
    shouldExist: true
    permissions: -rwxr-xr-x

  - name: format-hcl
    path: /usr/bin/format-hcl
    shouldExist: true
    permissions: -rwxr-xr-x

  - name: fmt.sh
    path: /usr/bin/fmt.sh
    shouldExist: true
    permissions: -rwxr-xr-x

  - name: terragrunt-fmt.sh
    path: /usr/bin/terragrunt-fmt.sh
    shouldExist: true
    permissions: -rwxr-xr-x

metadataTest:
  cmd: [entrypoint.sh]
  entrypoint: []
  exposedPorts: []
  workdir: /data
  envVars:
    - key: DEBIAN_FRONTEND
      value: noninteractive
