schemaVersion: 2.0.0

commandTests:
  - name: AWS CLI
    command: aws
    args: [--version]
    expectedOutput: [aws-cli/2.34.24]

  - name: Boto3 Python module
    command: pip3
    args: [list]
    expectedOutput:
      - boto3

  - name: APT lists cleaned
    command: bash
    args:
      - -lc
      - test -z "$(find /var/lib/apt/lists -mindepth 1 -maxdepth 1 2>/dev/null)"

  - name: APT cache cleaned
    command: bash
    args:
      - -lc
      - test -z "$(find /var/cache/apt -mindepth 1 -maxdepth 1 2>/dev/null)"
