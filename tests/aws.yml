schemaVersion: 2.0.0

commandTests:
  - name: AWS CLI
    command: bash
    envVars:
      - key: EXPECTED_AWS_VERSION
        value: ${AWS_VERSION}
    args:
      - -lc
      - aws --version | grep -Eq "^aws-cli/${EXPECTED_AWS_VERSION}"

  - name: Boto3 Python module
    command: pip3
    args: [list]
    expectedOutput:
      - boto3

  - name: Azure and GCP CLIs not installed
    command: bash
    args:
      - -lc
      - |
        for bin in az gcloud; do
          ! command -v "$bin" >/dev/null 2>&1 || exit 1
        done
