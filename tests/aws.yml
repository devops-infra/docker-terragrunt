schemaVersion: 2.0.0

commandTests:
  - name: AWS CLI
    command: aws
    envVars:
      - key: EXPECTED_AWS_VERSION
        value: ${AWS_VERSION}
    args: [--version]
    expectedOutput:
      - ^aws-cli/${EXPECTED_AWS_VERSION}

  - name: Boto3 Python module
    command: pip3
    args: [list]
    expectedOutput:
      - boto3
