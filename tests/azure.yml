schemaVersion: 2.0.0

commandTests:
  - name: Azure CLI
    command: az
    envVars:
      - key: EXPECTED_AZ_VERSION
        value: ${AZ_VERSION}
    args: [--version]
    expectedOutput:
      - ^azure-cli ${EXPECTED_AZ_VERSION}$

  - name: AWS and GCP CLIs not installed
    command: bash
    args:
      - -lc
      - |
        for bin in aws gcloud; do
          ! command -v "$bin" >/dev/null 2>&1 || exit 1
        done
