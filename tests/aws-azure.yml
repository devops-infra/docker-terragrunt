schemaVersion: 2.0.0

commandTests:
  - name: AWS CLI
    command: aws
    envVars:
      - key: EXPECTED_AWS_VERSION
        value: ${AWS_VERSION}
    args: [--version]
    expectedOutput:
      - ^aws-cli/${EXPECTED_AWS_VERSION}

  - name: Azure CLI
    command: az
    envVars:
      - key: EXPECTED_AZ_VERSION
        value: ${AZ_VERSION}
    args: [--version]
    expectedOutput:
      - ^azure-cli ${EXPECTED_AZ_VERSION}$

  - name: GCP CLI not installed
    command: bash
    args:
      - -lc
      - '! command -v gcloud >/dev/null 2>&1'
