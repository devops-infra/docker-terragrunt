schemaVersion: 2.0.0

commandTests:
  - name: AWS CLI
    command: bash
    envVars:
      - key: EXPECTED_AWS_VERSION
        value: ${AWS_VERSION}
    args:
      - -lc
      - aws --version | grep -Eq "^aws-cli/${EXPECTED_AWS_VERSION}"

  - name: Azure CLI
    command: bash
    envVars:
      - key: EXPECTED_AZ_VERSION
        value: ${AZ_VERSION}
    args:
      - -lc
      - az --version | grep -Eq "^azure-cli ${EXPECTED_AZ_VERSION}$"

  - name: Google Cloud SDK
    command: bash
    envVars:
      - key: EXPECTED_GCP_VERSION
        value: ${GCP_VERSION}
    args:
      - -lc
      - gcloud --version | grep -Eq "^Google Cloud SDK ${EXPECTED_GCP_VERSION}$"
