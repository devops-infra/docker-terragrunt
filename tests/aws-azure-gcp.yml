schemaVersion: 2.0.0

commandTests:
  - name: AWS CLI
    command: aws
    envVars:
      - key: EXPECTED_AWS_VERSION
        value: ${AWS_VERSION}
    args: [--version]
    expectedOutput:
      - ^aws-cli/${EXPECTED_AWS_VERSION}

  - name: Azure CLI
    command: az
    envVars:
      - key: EXPECTED_AZ_VERSION
        value: ${AZ_VERSION}
    args: [--version]
    expectedOutput:
      - ^azure-cli ${EXPECTED_AZ_VERSION}$

  - name: Google Cloud SDK
    command: gcloud
    envVars:
      - key: EXPECTED_GCP_VERSION
        value: ${GCP_VERSION}
    args: [--version]
    expectedOutput:
      - ^Google Cloud SDK ${EXPECTED_GCP_VERSION}$
