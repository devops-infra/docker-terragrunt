schemaVersion: 2.0.0

commandTests:
  - name: AWS CLI
    command: aws
    args: [--version]
    expectedOutput: [aws-cli/.*]

  - name: Azure CLI
    command: az
    args: [--version]
    expectedOutput: [azure-cli .*]

  - name: Google Cloud SDK
    command: gcloud
    args: [--version]
    expectedOutput: [Google Cloud SDK .*]
