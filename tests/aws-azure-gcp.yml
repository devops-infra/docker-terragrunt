schemaVersion: 2.0.0

commandTests:
  - name: Alpine version
    command: cat
    args: [/etc/os-release]
    expectedOutput: [VERSION_ID=3\.24]

  - name: hcledit
    command: bash
    envVars:
      - key: EXPECTED_HCLEDIT_VERSION
        value: ${HCLEDIT_VERSION}
    args:
      - -lc
      - hcledit version | grep -Eq "^${EXPECTED_HCLEDIT_VERSION}"

  - name: sops
    command: bash
    envVars:
      - key: EXPECTED_SOPS_VERSION
        value: ${SOPS_VERSION}
    args:
      - -lc
      - sops --version | grep -Eq "^sops ${EXPECTED_SOPS_VERSION}"

  - name: TFLint
    command: bash
    envVars:
      - key: EXPECTED_TFLINT_VERSION
        value: ${TFLINT_VERSION}
    args:
      - -lc
      - tflint --version | grep -Eq "^TFLint version ${EXPECTED_TFLINT_VERSION}"

  - name: Non-slim tools smoke tests
    command: bash
    args:
      - -lc
      - |
        curl --version >/dev/null
        bc --version >/dev/null
        docker --version >/dev/null
        git --version >/dev/null
        go version >/dev/null
        gpg --version >/dev/null
        dot -V >/dev/null 2>&1
        gh --version >/dev/null
        hcledit version >/dev/null
        jq --version >/dev/null
        make --version >/dev/null
        task --version >/dev/null
        TERM=xterm tput cols >/dev/null
        ssh -V >/dev/null 2>&1
        openssl version >/dev/null
        python3 --version >/dev/null
        pip3 --version >/dev/null
        unzip -v >/dev/null
        wget --version >/dev/null
        zip -v >/dev/null
        format-hcl -help >/dev/null
        terragrunt --version >/dev/null

  - name: Python modules
    command: pip
    args: [list]
    expectedOutput:
      - cloudflare
      - PyGithub
      - python-hcl2
      - requests
      - slack_sdk
      - anyio
      - zipp

  - name: AWS CLI
    command: bash
    envVars:
      - key: EXPECTED_AWS_VERSION
        value: ${AWS_VERSION}
    args:
      - -lc
      - |
        aws_minor="$(printf '%s' "${EXPECTED_AWS_VERSION}" | awk -F. '{print $1 "." $2}')"
        aws --version | grep -Eq "^aws-cli/${aws_minor}"

  - name: Boto3 Python module
    command: pip3
    args: [list]
    expectedOutput:
      - boto3

  - name: Azure CLI
    command: bash
    args:
      - -lc
      - >-
        az --version 2>/dev/null |
        grep -Eq '^azure-cli[[:space:]]+[0-9]+\.[0-9]+\.[0-9]+([[:space:]]+\*)?[[:space:]]*$'

  - name: Google Cloud SDK
    command: bash
    args:
      - -lc
      - >-
        gcloud --version 2>/dev/null |
        grep -Eq '^Google Cloud SDK[[:space:]]+[0-9]+\.[0-9]+\.[0-9]+[[:space:]]*$'

  - name: Temporary and APK cache cleaned
    command: bash
    args:
      - -lc
      - >-
        test ! -f /tmp/alpine-packages.txt &&
        test ! -f /tmp/alpine-packages-nonslim.txt &&
        test ! -f /tmp/alpine-packages-aws.txt &&
        test ! -f /tmp/pip_common_requirements.txt &&
        test ! -f /tmp/pip_aws_requirements.txt &&
        (test ! -d /var/cache/apk || test -z "$(find /var/cache/apk -mindepth 1 -maxdepth 1 2>/dev/null)") &&
        (test ! -d /root/.cache || test -z "$(find /root/.cache -mindepth 1 -maxdepth 1 2>/dev/null)")

fileExistenceTests:
  - name: entrypoint.sh
    path: /usr/bin/entrypoint.sh
    shouldExist: true
    permissions: -rwxr-xr-x

  - name: format-hcl
    path: /usr/bin/format-hcl
    shouldExist: true
    permissions: -rwxr-xr-x

  - name: fmt.sh
    path: /usr/bin/fmt.sh
    shouldExist: true
    permissions: -rwxr-xr-x

  - name: terragrunt-fmt.sh
    path: /usr/bin/terragrunt-fmt.sh
    shouldExist: true
    permissions: -rwxr-xr-x

metadataTest:
  cmd: [entrypoint.sh]
  entrypoint: []
  exposedPorts: []
  workdir: /data
