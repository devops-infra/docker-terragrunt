schemaVersion: 2.0.0

commandTests:
  - name: Azure CLI
    command: az
    envVars:
      - key: EXPECTED_AZ_VERSION
        value: ${AZ_VERSION}
    args: [--version]
    expectedOutput:
      - ^azure-cli ${EXPECTED_AZ_VERSION}$

  - name: Google Cloud SDK
    command: gcloud
    envVars:
      - key: EXPECTED_GCP_VERSION
        value: ${GCP_VERSION}
    args: [--version]
    expectedOutput:
      - ^Google Cloud SDK ${EXPECTED_GCP_VERSION}$

  - name: AWS CLI not installed
    command: bash
    args:
      - -lc
      - '! command -v aws >/dev/null 2>&1'
