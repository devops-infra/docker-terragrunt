schemaVersion: 2.0.0

commandTests:
  - name: Google Cloud SDK
    command: bash
    envVars:
      - key: EXPECTED_GCP_VERSION
        value: ${GCP_VERSION}
    args:
      - -lc
      - gcloud --version | grep -Eq "^Google Cloud SDK ${EXPECTED_GCP_VERSION}$"

  - name: AWS and Azure CLIs not installed
    command: bash
    args:
      - -lc
      - |
        for bin in aws az; do
          ! command -v "$bin" >/dev/null 2>&1 || exit 1
        done
