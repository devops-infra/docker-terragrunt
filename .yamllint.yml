extends: default
rules:
  empty-lines:
    max: 2
    max-end: 1
  document-end:
    present: false
  document-start:
    present: false
  indentation:
    spaces: 2
    indent-sequences: true
    check-multi-line-strings: false
  line-length:
    max: 220
    allow-non-breakable-inline-mappings: true
  new-line-at-end-of-file: enable
  new-lines:
    type: unix
  quoted-strings: disable
  trailing-spaces: {}
  truthy:
    allowed-values: ['true', 'false', 'yes', 'no']
    check-keys: false
