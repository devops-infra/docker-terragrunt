name: (Cron) Check for Updates

on:
  schedule:
    - cron: 0 5 * * 1
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  check:
    name: Check for new versions
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611
        with:
          version: 3.49.1

      - name: Check for new versions
        env:
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
          TERM: xterm-256color
        run: task update-versions

      - name: Run linters
        run: task lint

      - name: Commit and push changes (conditional)
        if: env.VERSION_TAG != ''
        uses: devops-infra/action-commit-push@f01d24007c469639f252dc88109ef96bfbff33db
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          target_branch: dependency/${{ env.VERSION_BRANCH }}
          commit_message: ⬆️ Bump for ${{ env.VERSION_TAG }}

      - name: Get template
        run: task git:get-pr-template

      - name: Create pull request
        if: env.VERSION_TAG != ''
        uses: devops-infra/action-pull-request@b2895bff2ff66579f6704d717a1ea75fad919e84
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          title: ⬆️ Bump for ${{ env.VERSION_TAG }}
          template: .tmp/PULL_REQUEST_TEMPLATE.md
          get_diff: true

  build-and-push:
    name: Build and push
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90
    needs: [check]
    env:
      VERSION_PREFIX: test-
    strategy:
      fail-fast: false
      matrix:
        flavour: [slim, plain, aws-azure-gcp]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611
        with:
          version: 3.49.1

      - name: Install Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Install QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a
        with:
          image: tonistiigi/binfmt@sha256:d3b963f787999e6c0219a48dba02978769286ff61a5f4d26245cb6a6e5567ea3
          platforms: amd64,arm64

      - name: Build and push
        env:
          BUILDX_NO_DEFAULT_ATTESTATIONS: 1
          DOCKER_BUILDKIT: 1
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TERM: xterm-256color
        run: |
          VERSION="$(task version:get)"
          TF_VERSION=$(printf "%s" "$VERSION" | sed -E \
            's/^tf-([0-9]+\.[0-9]+\.[0-9]+)-ot-[0-9]+\.[0-9]+\.[0-9]+-tg-[0-9]+\.[0-9]+\.[0-9]+$/\1/')
          OT_VERSION=$(printf "%s" "$VERSION" | sed -E \
            's/^tf-[0-9]+\.[0-9]+\.[0-9]+-ot-([0-9]+\.[0-9]+\.[0-9]+)-tg-[0-9]+\.[0-9]+\.[0-9]+$/\1/')
          TG_VERSION=$(printf "%s" "$VERSION" | sed -E \
            's/^tf-[0-9]+\.[0-9]+\.[0-9]+-ot-[0-9]+\.[0-9]+\.[0-9]+-tg-([0-9]+\.[0-9]+\.[0-9]+)$/\1/')
          {
            echo "TF_VERSION=${TF_VERSION}"
            echo "OT_VERSION=${OT_VERSION}"
            echo "TG_VERSION=${TG_VERSION}"
          } >> "$GITHUB_ENV"
          docker buildx create --use || true
          task login
          task push-${{ matrix.flavour }}
          GHCR_IMAGE="ghcr.io/devops-infra/docker-terragrunt"
          DOCKER_IMAGE="devopsinfra/docker-terragrunt"
          docker pull "${GHCR_IMAGE}:${{ env.VERSION_PREFIX }}${{ matrix.flavour }}-tf-${TF_VERSION}-tg-${TG_VERSION}"
          docker pull "${GHCR_IMAGE}:${{ env.VERSION_PREFIX }}${{ matrix.flavour }}-ot-${OT_VERSION}-tg-${TG_VERSION}"
          docker pull "${DOCKER_IMAGE}:${{ env.VERSION_PREFIX }}${{ matrix.flavour }}-tf-${TF_VERSION}-tg-${TG_VERSION}"
          docker pull "${DOCKER_IMAGE}:${{ env.VERSION_PREFIX }}${{ matrix.flavour }}-ot-${OT_VERSION}-tg-${TG_VERSION}"

      - name: Cont.Struc.Test - ${{ matrix.flavour }}
        uses: plexsystems/container-structure-test-action@c0a028aa96e8e82ae35be556040340cbb3e280ca
        with:
          image: >-
            devopsinfra/docker-terragrunt:${{ env.VERSION_PREFIX }}${{ matrix.flavour }}-tf-${{ env.TF_VERSION }}-tg-${{ env.TG_VERSION }}
          config: tests/${{ matrix.flavour }}.yml

      - name: Cont.Struc.Test - Terraform
        uses: plexsystems/container-structure-test-action@c0a028aa96e8e82ae35be556040340cbb3e280ca
        with:
          image: >-
            devopsinfra/docker-terragrunt:${{ env.VERSION_PREFIX }}${{ matrix.flavour }}-tf-${{ env.TF_VERSION }}-tg-${{ env.TG_VERSION }}
          config: tests/tf.yml

      - name: Cont.Struc.Test - OpenTofu
        uses: plexsystems/container-structure-test-action@c0a028aa96e8e82ae35be556040340cbb3e280ca
        with:
          image: >-
            devopsinfra/docker-terragrunt:${{ env.VERSION_PREFIX }}${{ matrix.flavour }}-ot-${{ env.OT_VERSION }}-tg-${{ env.TG_VERSION }}
          config: tests/ot.yml
